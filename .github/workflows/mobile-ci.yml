name: Mobile CI

on:
  push:
    branches: [main]
    paths: ['mobile/**']
  pull_request:
    branches: [main]
    paths: ['mobile/**']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Build
        working-directory: mobile
        run: ./gradlew assembleDebug --no-daemon

      - name: Unit Tests
        working-directory: mobile
        run: ./gradlew testDebugUnitTest --no-daemon
