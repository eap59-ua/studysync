name: Backend CI

on:
  push:
    branches: [main]
    paths: ['backend/**']
  pull_request:
    branches: [main]
    paths: ['backend/**']

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: studysync
          POSTGRES_PASSWORD: studysync_test
          POSTGRES_DB: studysync_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U studysync"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Lint
        working-directory: backend
        run: ruff check app/ tests/

      - name: Test
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://studysync:studysync_test@localhost:5432/studysync_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-secret
        run: pytest tests/ -v --tb=short
